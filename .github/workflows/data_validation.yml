name: Data Health Check

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Check for Data Integrity
        run: |
          # Dosyanın varlığını ve boş olmadığını kontrol eder
          if [ -s "data/raw/sample_sap_export.csv" ]; then
            echo "✅ SAP Export Data Found."
          else
            echo "❌ Critical Error: SAP Export Missing or Empty!"
            exit 1
          fi
